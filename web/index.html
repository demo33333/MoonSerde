<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonSerde Wasm Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-grid"></div>
  <div class="glow-orb orb-1"></div>
  <div class="glow-orb orb-2"></div>
  
  <div class="container">
    <header>
      <h1>MoonSerde <span>Playground</span></h1>
      <p>High-performance data serialization powered by MoonBit & WebAssembly</p>
    </header>

    <main class="dashboard">
      <div class="panel controls-panel">
        <div class="panel-header">
          <h2>Wasm JSON Parser</h2>
        </div>
        <div class="panel-content">
          <p class="description">Test bidirectional FFI! Input custom JSON, let MoonBit Wasm parse it to AST, and serialize it back.</p>
          <textarea id="json-input" class="cyber-input" rows="5">{
  "hello": "MoonSerde",
  "is_fast": true,
  "nested": [1, 2, 3]
}</textarea>
          <div class="button-group" style="margin-top: 15px;">
            <button id="btn-parse" class="cyber-btn parse-btn">Parse & Echo via MoonBit</button>
            <button id="btn-primitive" class="cyber-btn">Demo: Primitive String</button>
            <button id="btn-nested" class="cyber-btn">Demo: Nested Objects</button>
          </div>
        </div>
      </div>

      <div class="panel output-panel">
        <div class="panel-header">
          <h2>JSON Output</h2>
          <div class="status-indicator">
            <span class="dot"></span>
            <span class="status-text" id="status-text">Wasm Ready</span>
          </div>
        </div>
        <div class="panel-content code-container">
          <pre><code id="json-output">// Waiting for input...</code></pre>
        </div>
      </div>
    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
