<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonSerde Playground</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {margin:0; font-family:'Outfit',sans-serif; background:#0a0a0a; color:#e0e0e0;}
    .container {max-width:960px; margin:auto; padding:2rem;}
    h1 span {color:#00ffff;}
    .dashboard {display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;}
    .panel {background:rgba(255,255,255,0.04); border-radius:12px; padding:1rem; backdrop-filter:blur(8px);}
    .panel-header h2 {margin:0; font-size:1.2rem; color:#00ffff;}
    .cyber-input {width:100%; background:rgba(255,255,255,0.08); border:none; border-radius:8px; color:#e0e0e0; padding:0.8rem; font-family:'Fira Code',monospace;}
    .cyber-btn {background:#00ffff; color:#0a0a0a; border:none; border-radius:8px; padding:0.6rem 1rem; cursor:pointer; transition:transform 0.2s;}
    .cyber-btn:hover {transform:scale(1.05);}
    .status-indicator {display:flex; align-items:center; gap:0.4rem;}
    .dot {width:8px; height:8px; background:#00ff00; border-radius:50%; animation:pulse 2s infinite;}
    @keyframes pulse {0%{opacity:0.6;} 50%{opacity:1;} 100%{opacity:0.6;}}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>MoonSerde <span>Playground</span></h1>
      <p>WebAssembly powered JSON parser demo</p>
    </header>
    <main class="dashboard">
      <div class="panel controls-panel">
        <div class="panel-header"><h2>Controls</h2></div>
        <div class="panel-content">
          <p>Enter JSON and parse via MoonBit Wasm.</p>
        </div>
      </div>
      <div class="panel output-panel">
        <div class="panel-header"><h2>Output</h2></div>
        <div class="panel-content"><pre><code id="json-output">// Waiting for input...</code></pre></div>
      </div>
    </main>
  </div>
  <script src="main.js"></script>
</body>
</html>
